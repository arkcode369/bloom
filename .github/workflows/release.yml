name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPDATER_TOKEN: ${{ secrets.UPDATER_READ_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bloom Notes v__VERSION__'
          releaseBody: |
            See the [full changelog](https://github.com/srikresna/bloom-brain/blob/main/CHANGELOG.md) for details.
            
            ## Installation
            - **Windows**: Download the `.msi` or `.exe` installer below
            - **Existing users**: The app will auto-update in the background
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          tauriScript: npm run tauri

      # -- Publish latest.json to a public GitHub Gist so the auto-updater
      #    can reach it even though this repo is private.
      - name: Download latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = "application/vnd.github+json" }

          # Wait a moment for the release assets to be fully uploaded
          Start-Sleep -Seconds 10

          # Fetch release by tag
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -eq 'latest.json' }
          if (-not $asset) { throw "latest.json asset not found in release $tag" }

          # Download asset content via API
          $dlHeaders = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = "application/octet-stream" }
          Invoke-WebRequest -Uri $asset.url -Headers $dlHeaders -OutFile "latest.json"
          Write-Host "Downloaded latest.json:"
          Get-Content "latest.json"

      - name: Update public Gist with latest.json
        env:
          GIST_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.UPDATER_GIST_ID }}
        run: |
          $content = Get-Content "latest.json" -Raw
          $body = @{
            files = @{
              "latest.json" = @{
                content = $content
              }
            }
          } | ConvertTo-Json -Depth 4
          $headers = @{ Authorization = "Bearer $env:GIST_TOKEN"; Accept = "application/vnd.github+json" }
          Invoke-RestMethod -Uri "https://api.github.com/gists/$env:GIST_ID" -Method Patch -Headers $headers -Body $body -ContentType "application/json; charset=utf-8"
          Write-Host "Gist updated successfully"
